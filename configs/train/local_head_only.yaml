experiment_name: bitnet_local_head_only
seed: 42
data_config: configs/data/local_head_only.yaml

model:
  backend: huggingface
  backbone_name: microsoft/bitnet-b1.58-2B-4T-bf16
  projection_dim: 768
  pooling: masked_mean
  use_last_k_layers: 1
  normalize: true
  dtype: bfloat16
  gradient_checkpointing: true

tokenization:
  max_length: 256

training:
  mode: head_only
  epochs: 1
  micro_batch_size: 1
  grad_accum_steps: 32
  lr: 0.0002
  weight_decay: 0.01
  warmup_ratio: 0.1
  gradient_checkpointing: true
  bf16: true
  log_every_steps: 10
  eval_every_steps: 100
  save_every_steps: 100
  run_root: runs

loss:
  name: symmetric_infonce
  temperature: 0.05
