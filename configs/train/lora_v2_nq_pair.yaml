experiment_name: bitnet_lora_v2_nq_pair
seed: 42

data:
  train_sets:
    - name: sentence-transformers/natural-questions
      subset: pair
      format: pair
      split: train
      sample_size: 50000
      materialization: lazy

model:
  backend: huggingface
  backbone_name: microsoft/bitnet-b1.58-2B-4T-bf16
  projection_dim: 768
  pooling: masked_mean
  use_last_k_layers: 1
  normalize: true
  dtype: bfloat16
  gradient_checkpointing: true

lora:
  enabled: true
  r: 8
  alpha: 16
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

tokenization:
  max_length: 384

training:
  mode: lora
  epochs: 1
  micro_batch_size: 20
  grad_accum_steps: 2
  lr: 0.0001
  weight_decay: 0.01
  warmup_ratio: 0.05
  max_update_steps: 1563
  gradient_checkpointing: true
  bf16: true
  log_every_steps: 160
  eval_every_steps: 8000
  save_every_steps: 8000
  run_root: /mnt/usb/bitnet/runs

loss:
  name: symmetric_infonce
  temperature: 0.05
