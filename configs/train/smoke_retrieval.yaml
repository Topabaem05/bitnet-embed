experiment_name: bitnet_smoke_retrieval
seed: 42
data_config: configs/data/smoke_retrieval.yaml

model:
  backend: toy
  projection_dim: 32
  pooling: masked_mean
  use_last_k_layers: 1
  normalize: true

tokenization:
  max_length: 48

training:
  mode: full_ft
  epochs: 1
  micro_batch_size: 2
  grad_accum_steps: 1
  lr: 0.001
  weight_decay: 0.0
  warmup_ratio: 0.1
  gradient_checkpointing: false
  bf16: false
  log_every_steps: 1
  eval_every_steps: 10
  save_every_steps: 2
  run_root: runs

loss:
  name: triplet
  margin: 0.2
