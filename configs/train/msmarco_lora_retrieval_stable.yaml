experiment_name: bitnet_msmarco_lora_retrieval_stable
seed: 42

data:
  train_sets:
    - name: sentence-transformers/msmarco-bm25
      subset: triplet
      format: triplet
      split: train
      sample_size: 500000
      materialization: lazy
  eval_sets: []

model:
  backend: huggingface
  backbone_name: microsoft/bitnet-b1.58-2B-4T-bf16
  projection_dim: 768
  pooling: masked_mean
  use_last_k_layers: 1
  normalize: true
  dtype: bfloat16
  gradient_checkpointing: true

lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

tokenization:
  max_length: 384

training:
  mode: lora
  epochs: 1
  micro_batch_size: 4
  grad_accum_steps: 8
  lr: 0.00005
  weight_decay: 0.01
  warmup_ratio: 0.10
  gradient_checkpointing: true
  bf16: true
  max_grad_norm: 1.0
  fail_on_non_finite_loss: true
  fail_on_non_finite_grads: true
  check_parameters_every_steps: 50
  log_every_steps: 10
  eval_every_steps: 50
  save_every_steps: 50
  max_update_steps: 100
  run_root: runs

loss:
  name: triplet
  margin: 0.2