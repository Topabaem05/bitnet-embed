experiment_name: bitnet_lora_stronger
seed: 42

data:
  train_sets:
    - name: sentence-transformers/natural-questions
      subset: pair
      format: pair
      split: train
      sample_size: 50000
      materialization: lazy
    - name: tomaarsen/natural-questions-hard-negatives
      subset: triplet-5
      format: triplet
      split: train
      sample_size: 30000
      materialization: lazy
    - name: sentence-transformers/msmarco-bm25
      subset: triplet
      format: triplet
      split: train
      sample_size: 150000
      materialization: lazy

model:
  backend: huggingface
  backbone_name: microsoft/bitnet-b1.58-2B-4T-bf16
  projection_dim: 768
  pooling: masked_mean
  use_last_k_layers: 1
  normalize: true
  dtype: bfloat16
  gradient_checkpointing: true

lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

tokenization:
  max_length: 384

training:
  mode: lora
  epochs: 1
  micro_batch_size: 2
  grad_accum_steps: 16
  lr: 0.00008
  weight_decay: 0.01
  warmup_ratio: 0.05
  gradient_checkpointing: true
  bf16: true
  log_every_steps: 160
  eval_every_steps: 8000
  save_every_steps: 8000
  run_root: runs

loss:
  name: triplet
  margin: 0.2
