experiment_name: bitnet_lora_v3_msmarco_triplet
seed: 42

data:
  train_sets:
    - name: sentence-transformers/msmarco-bm25
      subset: triplet
      format: triplet
      split: train
      sample_size: 100000
      materialization: lazy

model:
  backend: huggingface
  backbone_name: microsoft/bitnet-b1.58-2B-4T-bf16
  projection_dim: 768
  pooling: masked_mean
  use_last_k_layers: 1
  normalize: true
  dtype: bfloat16
  gradient_checkpointing: true

lora:
  enabled: true
  r: 8
  alpha: 16
  dropout: 0.1
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

tokenization:
  max_length: 192

training:
  mode: lora
  epochs: 1
  micro_batch_size: 2
  grad_accum_steps: 16
  lr: 3.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  max_update_steps: 3125
  resume_weights_only: false
  gradient_checkpointing: true
  bf16: true
  log_every_steps: 160
  eval_every_steps: 1600
  save_every_steps: 1600
  run_root: /mnt/usb/bitnet/runs

loss:
  name: triplet
  margin: 0.2
